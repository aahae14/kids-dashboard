<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KIDS 브랜드 매출 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a1a;font-size:13px}
.container{max-width:960px;margin:0 auto;padding:16px}
h1{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:14px}
.controls{background:#fff;border:1px solid #e2e6ea;border-radius:8px;padding:14px 16px;margin-bottom:14px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:5px;min-width:160px}
.ctrl-group.wide{flex:1}
label{font-size:11px;color:#666;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
select{font-size:13px;padding:6px 10px;border:1px solid #d0d6dd;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer;height:34px}
.period-btns{display:flex;gap:5px}
.period-btns button{font-size:12px;padding:6px 12px;border:1px solid #d0d6dd;border-radius:20px;background:#fff;color:#555;cursor:pointer;transition:all .15s;height:34px;white-space:nowrap}
.period-btns button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.result-box{background:#fff;border:1px solid #e2e6ea;border-radius:8px;overflow:hidden}
.result-header{padding:12px 16px;background:#f8f9fb;border-bottom:1px solid #e2e6ea;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.store-name{font-size:15px;font-weight:700;color:#1a1a1a}
.period-info{font-size:11px;color:#777;margin-top:2px}
.unit-badge{font-size:11px;padding:3px 9px;background:#EFF6FF;color:#1d4ed8;border-radius:20px;border:1px solid #BFDBFE;font-weight:600;white-space:nowrap}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:520px}
thead tr{background:#f8f9fb}
thead th{padding:8px 14px;font-size:11px;color:#555;font-weight:700;border-bottom:2px solid #d9dfe8;white-space:nowrap;letter-spacing:.02em}
thead th:first-child{text-align:left;width:140px}
thead th:not(:first-child){text-align:right}
tbody td{padding:7px 14px;border-bottom:1px solid #f0f3f6;font-size:13px}
tbody td:first-child{text-align:left;font-weight:500;color:#2d2d2d}
tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#fafbfc}
tbody tr.bludog-row{background:#EFF6FF}
tbody tr.bludog-row:hover{background:#DBEAFE}
tbody tr.bludog-row td:first-child{color:#1d4ed8;font-weight:700}
tbody tr.bludog-row td{border-bottom:1px solid #DBEAFE}
.total-row td{font-weight:700;background:#f0f4ff;border-top:2px solid #c5d5f0;border-bottom:none;font-size:13px}
.total-row td:first-child{color:#1a1a1a}
.up{color:#059669;font-weight:600}
.dn{color:#dc2626;font-weight:600}
.neu{color:#9ca3af}
.no-data{padding:48px;text-align:center;color:#9ca3af;font-size:14px}
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:0;border-bottom:1px solid #e2e6ea}
.kpi-card{padding:12px 14px;border-right:1px solid #eef0f3}
.kpi-card:last-child{border-right:none}
.kpi-card.kpi-bludog{background:#EFF6FF}
.kpi-card.kpi-store{background:#F0FDF4}
.kpi-label{font-size:10px;color:#888;font-weight:600;letter-spacing:.03em;text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:700;color:#1a1a1a;line-height:1.2}
.kpi-sub{font-size:12px;font-weight:400;color:#aaa}
.kpi-up{color:#059669}
.kpi-dn{color:#dc2626}
.kpi-neu{color:#9ca3af}
.monthly-section{border-top:2px solid #e2e6ea;margin-top:0}
.monthly-title{padding:10px 16px 6px;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;background:#f8f9fb;border-bottom:1px solid #e2e6ea}
.monthly-table th{padding:7px 10px;font-size:11px;color:#555;font-weight:700;border-bottom:2px solid #d9dfe8;background:#f8f9fb;white-space:nowrap;text-align:right}
.monthly-table th.month-col,.monthly-table td.month-col{text-align:left;position:sticky;left:0;background:#fff;z-index:1;min-width:70px}
.monthly-table thead th.month-col{background:#f8f9fb;z-index:2}
.monthly-table th.sum-col,.monthly-table td.sum-col{text-align:right;font-weight:700;background:#f0f4ff;border-left:1px solid #d9dfe8}
.monthly-table tfoot th,.monthly-table tfoot td{background:#f0f4ff}
.monthly-table td{padding:5px 10px;text-align:right;border-bottom:1px solid #f0f3f6;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.monthly-table tbody tr:hover td{background:#fafbfc}
.monthly-table tbody tr:hover td.month-col{background:#fafbfc}
.monthly-total-row td{font-weight:700;font-size:12px;border-top:2px solid #c5d5f0}
.no-month-row td{color:#ccc}
.no-data-mark{font-size:10px;color:#ccc}
.excel-btn{font-size:12px;padding:5px 12px;border:1px solid #16a34a;border-radius:6px;background:#f0fdf4;color:#16a34a;cursor:pointer;font-weight:600;white-space:nowrap}
.excel-btn:hover{background:#dcfce7}
.note-cell{white-space:nowrap}
.note-badge{font-size:10px;padding:2px 7px;background:#FEF3C7;color:#92400E;border-radius:20px;border:1px solid #FDE68A;font-weight:600;white-space:nowrap}
.compare-row{font-size:11px;color:#9ca3af}
.compare-row td{padding:3px 14px 6px;border-bottom:1px solid #f0f3f6}
.compare-row td:not(:first-child){text-align:right}
</style>
</head>
<body>
<div class="container">
  <h1>■ KIDS 동업계 국내 브랜드 매출 현황</h1>
  <div class="controls">
    <div class="ctrl-group wide">
      <label>매장 선택</label>
      <select id="storeSelect"></select>
    </div>
    <div class="ctrl-group">
      <label>기간 유형</label>
      <div class="period-btns">
        <button onclick="setPT('annual',this)">연간</button>
        <button onclick="setPT('md',this)">MD평가기준</button>
        <button class="active" onclick="setPT('custom',this)">직접입력</button>
      </div>
    </div>
    <div class="ctrl-group" id="periodCtrl">
      <label>기간</label>
      <select id="periodDetail"></select>
    </div>
    <div class="ctrl-group" id="customCtrl" style="display:none">
      <label>시작 ~ 종료</label>
      <div style="display:flex;gap:4px;align-items:center">
        <select id="startM" style="flex:1;min-width:80px"></select>
        <span style="color:#aaa;font-size:12px;padding:0 2px">~</span>
        <select id="endM" style="flex:1;min-width:80px"></select>
      </div>
    </div>
  </div>
  <div class="result-box" id="result">
    <div class="no-data">매장과 기간을 선택하세요.</div>
  </div>
</div>

// Populate store select
const ALLOWED_CODES = new Set(['101', '102', '103', '107', '108', '109', '110', '113', '114', '115', '116', '119', '120', '121', '122', '123', '124', '125', '128', '131', '132', '134', '151', '153', '162', '165', '169', '173', '175', '177', '178', '179', '185', '195', '199', '217', '224', '226'].map(String));
const storeSelect = document.getElementById('storeSelect');
Object.entries(STORES)
  .filter(([code])=>ALLOWED_CODES.has(code))
  .sort((a,b)=>a[1].n.localeCompare(b[1].n))
  .forEach(([code,info])=>{
    const overrides = {'224':'현대신촌','226':'LF광양','199':'갤러리센터','185':'신세계대전'};
    const rawName = overrides[code] || info.n;
    const displayName = rawName.replace(/\s+/g,'');
    const o = new Option(displayName, code);
    storeSelect.add(o);
  });
// Default to 롯데 본점
const defOpt = Array.from(storeSelect.options).find(o=>o.value==='101');
if(defOpt) storeSelect.value='101';

let periodType = 'custom';

// Populate period detail for annual
function populatePeriodDetail(type) {
  const pd = document.getElementById('periodDetail');
  pd.innerHTML = '';
  document.getElementById('periodCtrl').style.display = '';
  document.getElementById('customCtrl').style.display = 'none';

  if (type === 'annual') {
    ['2026','2025','2024','2023'].forEach(yr=>{
      pd.add(new Option(yr + '년', yr));
    });
    pd.value = '2026';
  } else if (type === 'md') {
    // Fixed list: 27SS, 26FW, 26SS, 25FW
    [['27SS','27SS'],['26FW','26FW'],['26SS','26SS'],['25FW','25FW']].forEach(([label,val])=>{
      pd.add(new Option(label, val));
    });
    pd.value = '26FW';
  } else {
    // custom
    document.getElementById('periodCtrl').style.display = 'none';
    document.getElementById('customCtrl').style.display = '';
    const mSel = document.getElementById('startM');
    const eSel = document.getElementById('endM');
    mSel.innerHTML=''; eSel.innerHTML='';
    MONTHS_ALL.forEach(m=>{
      const lbl = m.slice(0,4)+'/'+m.slice(4);
      mSel.add(new Option(lbl, m));
      eSel.add(new Option(lbl, m));
    });
    mSel.value = MONTHS_ALL[MONTHS_ALL.length-1];
    eSel.value = MONTHS_ALL[MONTHS_ALL.length-1];
    mSel.addEventListener('change',update);
    eSel.addEventListener('change',update);
  }
  pd.addEventListener('change',update);
}

function setPT(type, btn) {
  periodType = type;
  document.querySelectorAll('.period-btns button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  populatePeriodDetail(type);
  update();
}

// MD period calc: returns {start, end} as YYYYMM strings, and {prevStart, prevEnd}
function getMDPeriod(code, seasonKey) {
  const storeType = STORES[code]?.t || '롯데';
  const season = seasonKey.slice(2); // 'FW' or 'SS'
  const yr = parseInt('20' + seasonKey.slice(0,2)); // e.g. 2026

  let startM, endM, prevStart, prevEnd;

  if (season === 'FW') {
    if (storeType === '신세계') { startM=`${yr-1}04`; endM=`${yr}03`; prevStart=`${yr-2}04`; prevEnd=`${yr-1}03`; }
    else if (storeType === '현대') { startM=`${yr-1}06`; endM=`${yr}05`; prevStart=`${yr-2}06`; prevEnd=`${yr-1}05`; }
    else { startM=`${yr-1}05`; endM=`${yr}04`; prevStart=`${yr-2}05`; prevEnd=`${yr-1}04`; }
  } else { // SS
    if (storeType === '신세계') { startM=`${yr-2}10`; endM=`${yr-1}09`; prevStart=`${yr-3}10`; prevEnd=`${yr-2}09`; }
    else if (storeType === '현대') { startM=`${yr-2}12`; endM=`${yr-1}11`; prevStart=`${yr-3}12`; prevEnd=`${yr-2}11`; }
    else { startM=`${yr-2}11`; endM=`${yr-1}10`; prevStart=`${yr-3}11`; prevEnd=`${yr-2}10`; }
  }
  return {startM, endM, prevStart, prevEnd};
}

function genMonths(startM, endM) {
  const result = [];
  let y=parseInt(startM.slice(0,4)), m=parseInt(startM.slice(4));
  const ey=parseInt(endM.slice(0,4)), em=parseInt(endM.slice(4));
  while(y<ey||(y===ey&&m<=em)){
    result.push(String(y)+String(m).padStart(2,'0'));
    m++; if(m>12){m=1;y++;}
  }
  return result;
}

function getSelectedPeriod(code) {
  if (periodType === 'annual') {
    const yr = document.getElementById('periodDetail')?.value || '2025';
    const curr = MONTHS_ALL.filter(m=>m.startsWith(yr));
    // 전년 비교는 curr에 있는 월과 동일한 월만 (예: 26년 1-2월만 있으면 25년 1-2월과 비교)
    const currMonths = curr.map(m=>m.slice(4)); // ['01','02',...]
    const prevYr = String(parseInt(yr)-1);
    const prev = MONTHS_ALL.filter(m=>m.startsWith(prevYr) && currMonths.includes(m.slice(4)));
    const prevLabel = prev.length < 12
      ? `${prevYr}년 ${currMonths[0]}~${currMonths[currMonths.length-1]}월`
      : `${prevYr}년 동기간`;
    return {curr, prev, label:`${yr}년 연간`, prevLabel};
  } else if (periodType === 'md') {
    const sk = document.getElementById('periodDetail')?.value || '26FW';
    const {startM, endM, prevStart, prevEnd} = getMDPeriod(code, sk);
    const curr = MONTHS_ALL.filter(m=>m>=startM && m<=endM);
    const fmt = m => m.slice(0,4)+'.'+m.slice(4);
    const storeType = STORES[code]?.t || '롯데';
    // 전년 동월 비교: curr의 상대 순번에 해당하는 전년 MD 월만 사용
    const mdAllMonths = genMonths(startM, endM);
    const mdPrevAllMonths = genMonths(prevStart, prevEnd);
    const currIdxSet = new Set(curr.map(m => mdAllMonths.indexOf(m)).filter(i=>i>=0));
    const prev = mdPrevAllMonths.filter((_,i) => currIdxSet.has(i)).filter(m=>MONTHS_ALL.includes(m));
    const prevActualEnd = prev.length>0 ? prev[prev.length-1] : prevEnd;
    const prevLabel = prev.length < mdPrevAllMonths.length
      ? `${fmt(prevStart)} ~ ${fmt(prevActualEnd)} (동월 ${prev.length}개월)`
      : `${fmt(prevStart)} ~ ${fmt(prevEnd)}`;
    return {curr, prev,
      label:`${sk} MD평가기준 (${storeType}) : ${fmt(startM)} ~ ${fmt(endM)}`,
      prevLabel
    };
  } else {
    const s = document.getElementById('startM')?.value;
    const e = document.getElementById('endM')?.value;
    if (!s||!e) return {curr:[],prev:[],label:'-',prevLabel:'-'};
    const curr = MONTHS_ALL.filter(m=>m>=s&&m<=e);
    const len = curr.length;
    // prev: same length, go back 12 months from start
    const ps = shiftM(s,-12); const pe = shiftM(e,-12);
    const prev = MONTHS_ALL.filter(m=>m>=ps&&m<=pe);
    const fmt = m=>m.slice(0,4)+'.'+m.slice(4);
    return {curr,prev,label:`${fmt(s)} ~ ${fmt(e)} (${len}개월)`,prevLabel:`${fmt(ps)} ~ ${fmt(pe)}`};
  }
}

function shiftM(yyyymm, delta) {
  let y=parseInt(yyyymm.slice(0,4)), m=parseInt(yyyymm.slice(4))+delta;
  while(m<=0){m+=12;y--;} while(m>12){m-=12;y++;}
  return String(y)+String(m).padStart(2,'0');
}

const N = 1; // 저장값이 이미 백만원 단위 (천원 ÷ 1000)
function brandLabel(b) {
  return b === '나이키/플레이키즈' ? '나이키' : b;
}

function fmtNum(v) {
  if(v===null||v===undefined) return '-';
  const n = Math.round(v/N);
  return n.toLocaleString();
}
function fmtG(g) {
  if(g===null||g===undefined) return '<span class="neu">-</span>';
  const s=(g>=0?'+':'')+g.toFixed(0)+'%';
  return `<span class="${g>=0?'up':'dn'}">${s}</span>`;
}

function update() {
  const code = storeSelect.value;
  if (!code) return;
  const storeData = MONTHLY[code] || {};
  const overrides = {'224':'현대신촌','226':'LF광양','199':'갤러리센터','185':'신세계대전'};
  const rawStoreName = overrides[code] || STORES[code]?.n || code;
  const storeName = rawStoreName.replace(/\s+/g,'');
  const {curr, prev, label, prevLabel} = getSelectedPeriod(code);

  // Aggregate
  const brandCurr = {}, brandPrev = {};
  curr.forEach(m => {
    Object.entries(storeData[m]||{}).forEach(([b,v])=>{ brandCurr[b]=(brandCurr[b]||0)+v; });
  });
  prev.forEach(m => {
    Object.entries(storeData[m]||{}).forEach(([b,v])=>{ brandPrev[b]=(brandPrev[b]||0)+v; });
  });

  const latestMonth = MONTHS_ALL[MONTHS_ALL.length - 1];
  const latestData = storeData[latestMonth] || {};
  // 최신월에 매출 없는 브랜드는 폐점/철수로 간주하여 제외
  const allBrands = new Set(
    [...Object.keys(brandCurr),...Object.keys(brandPrev)]
    .filter(b => (latestData[b] || 0) > 0)
  );
  if(allBrands.size===0){
    document.getElementById('result').innerHTML='<div class="no-data">해당 기간에 데이터가 없습니다.</div>';
    return;
  }

  // Compute first sale month per brand (across all available data)
  const firstSale = {};
  MONTHS_ALL.forEach(m => {
    const mdata = storeData[m] || {};
    Object.entries(mdata).forEach(([b,v]) => {
      if (v > 0 && !firstSale[b]) firstSale[b] = m;
    });
  });
  const DATA_START = MONTHS_ALL[0]; // '202310'

  // Sort by curr sales descending (no pinning)
  const sorted = Array.from(allBrands).sort((a,b)=>(brandCurr[b]||0)-(brandCurr[a]||0));

  const nM = curr.length || 1;
  const availM = curr.filter(m=>storeData[m]&&Object.keys(storeData[m]).length>0).length;
  const periodNote = availM < curr.length ? ` · 데이터 ${availM}/${curr.length}개월` : '';

  let rows='', totC=0, totP=0;
  sorted.forEach((brand,rankIdx)=>{
    const c = brandCurr[brand]||0;
    const p = brandPrev[brand]||0;
    totC+=c; totP+=p;
    const avg = c/nM;
    const g = p>0 ? (c-p)/p*100 : null;
    const isBD = brand==='블루독';
    const rankNum = `<span style="color:#aaa;font-size:11px;margin-right:6px;font-variant-numeric:tabular-nums">${rankIdx+1}</span>`;
    const STORE_OPEN = {'195':'202502','134':'202503','226':'202507','217':'202409','177':'202408'};
    const storeOpenMonth = STORE_OPEN[code];
    const noteMonth = firstSale[brand];
    const isNewBrand = noteMonth && noteMonth > DATA_START && (!storeOpenMonth || noteMonth > storeOpenMonth);
    const noteStr = isNewBrand
      ? `<span class="note-badge">${noteMonth.slice(0,4)}.${noteMonth.slice(4)} 입점</span>` : '';
    rows+=`<tr class="${isBD?'bludog-row':''}">
      <td>${rankNum}${brandLabel(brand)}</td>
      <td>${fmtNum(c)}</td>
      <td>${fmtNum(avg)}</td>
      <td>${p>0?fmtNum(p):'-'}</td>
      <td>${fmtG(g)}</td>
      <td class="note-cell">${noteStr}</td>
    </tr>`;
  });

  const totG = totP>0?(totC-totP)/totP*100:null;
  rows+=`<tr class="total-row">
    <td>합 계</td>
    <td>${fmtNum(totC)}</td>
    <td>${fmtNum(totC/nM)}</td>
    <td>${totP>0?fmtNum(totP):'-'}</td>
    <td>${fmtG(totG)}</td>
    <td></td>
  </tr>`;

  // Monthly rows
  const monthlyRows = curr.map(m=>{
    const mdata = storeData[m] || {};
    const rowTotal = sorted.reduce((s,b)=>s+(mdata[b]||0),0);
    const hasData = Object.keys(mdata).length > 0;
    const label = m.slice(0,4)+'/'+m.slice(4);
    const cells = sorted.map(b=>{
      const v = mdata[b]||0;
      return `<td class="${!hasData?'no-month':''}">${v>0?fmtNum(v):''}</td>`;
    }).join('');
    return `<tr class="${!hasData?'no-month-row':''}">
      <td class="month-col${!hasData?' no-month':''}">${label}${!hasData?'<span class="no-data-mark"> (데이터없음)</span>':''}</td>
      ${cells}

    </tr>`;
  }).join('');

  // Find 블루독 data for KPI
  const bdCurr = brandCurr['블루독'] || 0;
  const bdPrev = brandPrev['블루독'] || 0;
  const bdAvg = bdCurr / nM;
  const bdG = bdPrev > 0 ? (bdCurr - bdPrev) / bdPrev * 100 : null;
  const bdGStr = bdG !== null ? `<span class="${bdG>=0?'kpi-up':'kpi-dn'}">${bdG>=0?'+':''}${bdG.toFixed(1)}%</span>` : '<span class="kpi-neu">-</span>';
  const totalGStr = totG !== null ? `<span class="${totG>=0?'kpi-up':'kpi-dn'}">${totG>=0?'+':''}${totG.toFixed(1)}%</span>` : '<span class="kpi-neu">-</span>';

  document.getElementById('result').innerHTML=`
    <div class="result-header">
      <div>
        <div class="store-name">${storeName}</div>
        <div class="period-info">${label}${periodNote}&nbsp;&nbsp;<span style="color:#bbb">|</span>&nbsp;&nbsp;전년동기: ${prevLabel}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="unit-badge">단위: 백만원 · VAT 제외</span>
        <button class="excel-btn" onclick="downloadExcel()">엑셀 다운로드</button>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi-card kpi-bludog">
        <div class="kpi-label">블루독 순위</div>
        <div class="kpi-val">${sorted.indexOf('블루독')+1}위 <span class="kpi-sub">/ ${sorted.length}개 브랜드</span></div>
      </div>
      <div class="kpi-card kpi-bludog">
        <div class="kpi-label">블루독 월평균매출</div>
        <div class="kpi-val">${fmtNum(bdAvg)}<span class="kpi-sub"> 백만</span></div>
      </div>
      <div class="kpi-card kpi-bludog">
        <div class="kpi-label">블루독 신장율</div>
        <div class="kpi-val">${bdGStr}</div>
      </div>
      <div class="kpi-card kpi-store">
        <div class="kpi-label">점포 브랜드당 월평균매출</div>
        <div class="kpi-val">${fmtNum(totC/nM/sorted.length)}<span class="kpi-sub"> 백만</span></div>
      </div>
      <div class="kpi-card kpi-store">
        <div class="kpi-label">점포 신장율</div>
        <div class="kpi-val">${totalGStr}</div>
      </div>
    </div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>브랜드명</th>
        <th>누계매출</th>
        <th>월평균매출</th>
        <th>전년동기</th>
        <th>신장율</th>
        <th>비고</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div class="monthly-section">
      <div class="monthly-title">월별 브랜드 매출</div>
      <div class="table-wrap">
      <table class="monthly-table">
        <thead><tr>
          <th class="month-col">월</th>
          ${sorted.map(b=>`<th>${brandLabel(b)}</th>`).join('')}
        </tr></thead>
        <tbody>${monthlyRows}</tbody>
        <tfoot><tr class="monthly-total-row">
          <td class="month-col">합계</td>
          ${sorted.map(b=>`<td>${fmtNum(brandCurr[b]||0)}</td>`).join('')}
        </tr></tfoot>
      </table>
      </div>
    </div>`;
}

storeSelect.addEventListener('change', update);

function downloadExcel() {
  const code = storeSelect.value;
  const storeData = MONTHLY[code] || {};
  const overrides = {'224':'현대신촌','226':'LF광양','199':'갤러리센터','185':'신세계대전'};
  const rawStoreName = overrides[code] || STORES[code]?.n || code;
  const storeName = rawStoreName.replace(/\s+/g,'');
  const {curr, prev, label} = getSelectedPeriod(code);

  const brandCurr = {}, brandPrev = {};
  curr.forEach(m=>{ Object.entries(storeData[m]||{}).forEach(([b,v])=>{ brandCurr[b]=(brandCurr[b]||0)+v; }); });
  prev.forEach(m=>{ Object.entries(storeData[m]||{}).forEach(([b,v])=>{ brandPrev[b]=(brandPrev[b]||0)+v; }); });
  const allBrands = new Set([...Object.keys(brandCurr),...Object.keys(brandPrev)]);
  const sorted = Array.from(allBrands).sort((a,b)=>(brandCurr[b]||0)-(brandCurr[a]||0));
  const firstSale = {};
  MONTHS_ALL.forEach(m => {
    const md = storeData[m] || {};
    Object.entries(md).forEach(([b,v]) => { if(v>0 && !firstSale[b]) firstSale[b]=m; });
  });
  const DATA_START = MONTHS_ALL[0];
  const nM = curr.length || 1;

  // Build CSV (Excel compatible)
  const rows = [];

  // === Sheet 1: 브랜드별 요약 ===
  rows.push(['■ KIDS 동업계 국내 브랜드 매출 현황']);
  rows.push([storeName, label]);
  rows.push(['단위: 백만원 (VAT 제외)']);
  rows.push([]);
  rows.push(['순위', '브랜드명', '누계매출', '월평균매출', '전년동기', '신장율', '비고']);

  sorted.forEach((brand, i) => {
    const c = brandCurr[brand]||0;
    const p = brandPrev[brand]||0;
    const avg = c/nM;
    const g = p>0 ? (c-p)/p*100 : null;
    const nm = firstSale[brand];
    const noteExcel = (nm && nm > DATA_START) ? nm.slice(0,4)+'.'+nm.slice(4)+' 입점' : '';
    rows.push([
      i+1,
      brandLabel(brand),
      Math.round(c),
      Math.round(avg),
      p>0 ? Math.round(p) : '',
      g !== null ? (g>=0?'+':'')+g.toFixed(0)+'%' : '',
      noteExcel
    ]);
  });

  // Totals
  const totC = sorted.reduce((s,b)=>s+(brandCurr[b]||0),0);
  const totP = sorted.reduce((s,b)=>s+(brandPrev[b]||0),0);
  const totG = totP>0?(totC-totP)/totP*100:null;
  rows.push(['', '합 계', Math.round(totC), Math.round(totC/nM), totP>0?Math.round(totP):'', totG!==null?(totG>=0?'+':'')+totG.toFixed(0)+'%':'']);

  // Spacer
  rows.push([]);
  rows.push([]);

  // === Sheet 2: 월별 매출 ===
  rows.push(['■ 월별 브랜드 매출']);
  rows.push(['월', ...sorted.map(brandLabel)]);

  curr.forEach(m => {
    const mdata = storeData[m] || {};
    const lbl = m.slice(0,4)+'/'+m.slice(4);
    rows.push([lbl, ...sorted.map(b => mdata[b]>0 ? Math.round(mdata[b]) : '')]);
  });

  // Monthly total row
  rows.push(['합계', ...sorted.map(b => Math.round(brandCurr[b]||0))]);

  // Build CSV string
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');

  // BOM for Korean Excel
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `KIDS_브랜드매출_${storeName}_${label.replace(/[\s:/~]/g,'_')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('periodDetail').addEventListener('change', update);
populatePeriodDetail('custom');
update();
</script>
